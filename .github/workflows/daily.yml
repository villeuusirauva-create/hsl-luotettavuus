name: HSL Päivittäinen luotettavuusanalyysi

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyysi:
    runs-on: ubuntu-latest

    steps:
      - name: Hae repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Asenna kirjastot
        run: pip install pandas requests zstandard matplotlib

      - name: Aja analyysi
        timeout-minutes: 30
        run: python hsl_luotettavuus.py

      - name: Tallenna tulokset GitHubiin
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          mkdir -p tulokset
          git add -f tulokset/ || true
          git diff --staged --quiet || git commit -m "Päivittäinen raportti $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
